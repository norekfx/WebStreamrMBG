name: Deploy to Unstable
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '!src/utils/manifest.ts'
      - 'tsconfig.json'
      - 'Procfile'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Generate beamup-host.json
        run: echo '{"host":"87d6a6ef6b58-webstreamrmbg-dev.baby-beamup.club"}' > beamup-host.json
      - name: Install
        run: npm install
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEAMUP_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan a.baby-beamup.club >> ~/.ssh/known_hosts
      - name: Deploy to Unstable
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/version: '[^']*', \/\/ x-release-please-version/version: '${VERSION}-dev+${SHORT_SHA}', \/\/ x-release-please-version/" src/utils/manifest.ts
          npm run build
          git remote add beamup-dev dokku@a.baby-beamup.club:87d6a6ef6b58/webstreamrmbg-dev
          git add src/utils/manifest.ts dist/ beamup-host.json --force
          git commit -m "ci: build for unstable deploy (v${VERSION}-dev+${SHORT_SHA})" || true
          git push beamup-dev HEAD:main --force
      - name: Verify deployment
        run: |
          sleep 30
          curl -f https://87d6a6ef6b58-webstreamrmbg-dev.baby-beamup.club/manifest.json \
            || echo "Warning: may still be starting up"
